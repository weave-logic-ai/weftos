# WeftOS Admin — ADR-015 §concrete-example (declarative-TOML form).
#
# NOTE on key order: top-level scalars / arrays appear before any
# `[[entry_points]]`, `[narration]`, or `[surfaces.*]` sections because
# TOML binds subsequent bare-key lines to the most recently opened
# table. The ADR's example is rendered in prose order for readability;
# on-disk manifests must keep free-standing keys ahead of tables.
#
# NOTE on `surface_refs` vs `surfaces`: the manifest's surface list is
# keyed `surface_refs` so the dotted-table tree `[surfaces.empty_state]`
# / `[surfaces.loading_state]` / `[surfaces.offline_state]` (DESIGN.md
# §5 D-EM01 contract) can coexist with it. Older manifests that still
# spell the list `surfaces = [...]` need to be migrated when they pick
# up state surfaces — TOML disallows a bare-array and a dotted-table
# sharing the same key.
id       = "app://weftos.admin"
name     = "WeftOS Admin"
version  = "0.1.0"
icon     = "assets/admin.svg"

supported_modes  = ["ide", "desktop", "single-app"]
supported_inputs = ["pointer", "hybrid", "voice"]

surface_refs = [
    "surfaces/admin-main.toml",
    "surfaces/admin-kiosk.toml",
]

subscriptions = [
    "substrate/kernel/status",
    "substrate/kernel/processes",
    "substrate/kernel/services",
    "substrate/kernel/logs",
]

influences = [
    "wsp.activate",
    "kernel.restart-service",
    "kernel.kill-process",
]

permissions = [
    "fs:/var/log/weftos",
]

[[entry_points]]
kind = "cli"
flag = "admin"

[[entry_points]]
kind    = "vscode-command"
command = "weft.admin.open"

[[entry_points]]
kind   = "wake-word"
phrase = "weft, admin status"

[narration]
"substrate/kernel/services" = """
{{count(services, s -> s.status = "healthy")}} services healthy,
{{count(services, s -> s.status = "at_risk")}} at risk: {{names(services, s -> s.status = "at_risk")}}.
"""
"substrate/kernel/status" = """
Kernel is {{status.state}}. Uptime {{duration(status.started_at)}}.
"""

# ── D-EM01 state surfaces (DESIGN.md §5) ─────────────────────────────
# Mandatory on every app-window archetype. Today these are descriptive
# only — the surface composer reads them at render time once 0.8.x
# wires them up. Authored in lockstep with `weftos-admin-desktop.toml`.

[surfaces.empty_state]
type  = "ui://stack"
id    = "/empty"
attrs = { axis = "vertical" }

[surfaces.loading_state]
type  = "ui://stack"
id    = "/loading"
attrs = { axis = "vertical" }

[surfaces.offline_state]
type     = "ui://chip"
id       = "/offline"
bindings = { tone = '"crit"', label = '"◉ Demo mode — kernel daemon offline"' }
