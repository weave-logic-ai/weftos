[package]
name = "eml-core"
version = "0.1.0"
publish = true
edition = "2021"
description = "EML (exp-ln) universal function approximation — O(1) learned functions from data"
license = "MIT OR Apache-2.0"
repository = "https://github.com/weave-logic-ai/weftos"
keywords = ["machine-learning", "symbolic-regression", "approximation", "eml"]

[features]
default = []
# EXPERIMENTAL (0.6.8): ToyEmlAttention block composed of 5 EmlModels.
# See .planning/development_notes/eml_model_development_assessment.md.
experimental-attention = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
