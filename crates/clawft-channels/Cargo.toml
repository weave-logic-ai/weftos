[package]
name = "clawft-channels"
version.workspace = true
publish = false
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Channel plugin system for clawft"
keywords = ["telegram", "slack", "discord", "chat", "bot"]
categories = ["network-programming"]

[features]
default = ["native"]
native = ["clawft-plugin/native"]
email = []
whatsapp = []
# `signal` requires the real (tokio-backed) `CancellationToken` exposed
# by `clawft-plugin`'s `native` feature; without it the trait's cancel
# parameter resolves to the WASM-only fallback type and the
# `ChannelAdapter::start` impl fails to type-check in standalone
# `cargo check -p clawft-channels --features signal`.
signal = ["clawft-plugin/native"]
matrix = []
google-chat = []
irc = []
teams = []

[dependencies]
clawft-types = { workspace = true }
clawft-platform = { workspace = true }
clawft-plugin = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
chrono = { workspace = true }
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
dirs = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
