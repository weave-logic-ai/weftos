[package]
name = "clawft-channels"
version.workspace = true
publish = false
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Channel plugin system for clawft"
keywords = ["telegram", "slack", "discord", "chat", "bot"]
categories = ["network-programming"]

[features]
default = ["native"]
native = ["clawft-plugin/native"]
email = []
whatsapp = ["dep:axum", "dep:hex"]
signal = []
matrix = []
google-chat = []
irc = []
teams = []

[dependencies]
clawft-types = { workspace = true }
clawft-platform = { workspace = true }
clawft-plugin = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
chrono = { workspace = true }
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
dirs = { workspace = true }
uuid = { workspace = true }

# Optional, gated under the `whatsapp` feature for the webhook receiver
# (Cloud API meta.com -> our process). Used to host an HTTP listener that
# verifies `X-Hub-Signature-256` and dispatches inbound messages onto the
# `MessageBus` via `ChannelAdapterHost`.
axum = { version = "0.8", features = ["json", "macros"], optional = true }
hex = { version = "0.4", optional = true }

[dev-dependencies]
tokio = { workspace = true }
mockito = "1"
# Used by `whatsapp` webhook unit tests to drive the axum router
# in-process via `ServiceExt::oneshot`.
tower = { version = "0.5", features = ["util"] }
