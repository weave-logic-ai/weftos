[package]
name = "clawft-channels"
version.workspace = true
publish = false
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Channel plugin system for clawft"
keywords = ["telegram", "slack", "discord", "chat", "bot"]
categories = ["network-programming"]

[features]
default = ["native"]
native = ["clawft-plugin/native"]
email = []
whatsapp = []
signal = []
matrix = []
google-chat = []
irc = ["dep:tokio-rustls", "dep:webpki-roots", "dep:rustls-pki-types", "dep:base64"]
teams = []

[dependencies]
clawft-types = { workspace = true }
clawft-platform = { workspace = true }
clawft-plugin = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
chrono = { workspace = true }
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
dirs = { workspace = true }
uuid = { workspace = true }

# IRC (TLS dial). Versions match transitive copies already pinned in
# Cargo.lock via reqwest / tokio-tungstenite, so enabling the `irc`
# feature does not introduce additional crate downloads.
tokio-rustls = { version = "0.26", default-features = false, features = ["tls12", "ring"], optional = true }
webpki-roots = { version = "1.0", optional = true }
rustls-pki-types = { version = "1", optional = true }
base64 = { version = "0.22", optional = true }

[dev-dependencies]
tokio = { workspace = true }
