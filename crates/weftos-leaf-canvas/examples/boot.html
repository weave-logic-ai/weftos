<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WeftOS leaf-canvas — boot example</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #101218;
    color: #e8e8e8;
    font-family: system-ui, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 24px;
  }
  canvas {
    background: #101218;
    image-rendering: pixelated;
    border: 1px solid #333;
  }
  pre {
    margin: 0;
    color: #88cc88;
    font-size: 12px;
  }
</style>
</head>
<body>
  <h2 style="margin:0">WeftOS leaf-canvas — boot</h2>
  <pre>Same scene shape as `weftos-leaf-sim::examples::boot`.</pre>
  <canvas id="leaf-canvas" width="800" height="480"></canvas>

  <script type="module">
    // Generated by `wasm-pack build --target web --out-dir examples/pkg`.
    // This file isn't checked in — `wasm-pack` regenerates it from the
    // crate sources. The path is relative so a static-file server
    // serving `examples/` resolves it correctly.
    import init, { boot } from './pkg/weftos_leaf_canvas.js';

    async function run() {
      await init();
      // `boot` is a `#[wasm_bindgen(start)]` entry point that:
      //   1. Looks up `#leaf-canvas` in the document.
      //   2. Builds a `SceneStore` with a header + a few text rows.
      //   3. Constructs a `CanvasSurface` and dispatches `render_damage`.
      //
      // Phase D ships this as documentation only — the v1 crate doesn't
      // expose `boot`; Phase E will land it once the mesh client is in
      // place. The HTML page exists today so the build flow is
      // discoverable.
      if (typeof boot === 'function') {
        boot();
      } else {
        console.warn('weftos-leaf-canvas: no `boot` entry — Phase E will wire it');
      }
    }
    run().catch(err => console.error('weftos-leaf-canvas boot failed', err));
  </script>
</body>
</html>
