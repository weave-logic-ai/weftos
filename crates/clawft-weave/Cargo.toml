[package]
name = "clawft-weave"
version.workspace = true
publish = false
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "WeftOS operator CLI (weaver) — kernel management, services, and agent orchestration"
keywords = ["cli", "kernel", "os", "agent", "operator"]
categories = ["command-line-utilities"]

[lib]
name = "clawft_weave"
path = "src/lib.rs"

[[bin]]
name = "weaver"
path = "src/main.rs"

[package.metadata.dist]
dist = true

[features]
default = ["exochain", "cluster", "ecc", "mesh"]
cluster = ["clawft-kernel/cluster"]
ecc = ["clawft-kernel/ecc", "dep:blake3"]
exochain = ["clawft-kernel/exochain", "dep:exo-resource-tree"]
mesh = ["clawft-kernel/mesh"]
rvf-rpc = ["dep:weftos-rvf-wire", "dep:rvf-types"]

[dependencies]
clawft-core = { workspace = true, features = ["native"] }
eml-core = { workspace = true }
clawft-graphify = { workspace = true, default-features = false }
clawft-kernel = { workspace = true, features = ["native"] }
clawft-platform = { workspace = true }
clawft-rpc = { workspace = true }
clawft-types = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
weftos-leaf-types = { path = "../weftos-leaf-types", features = ["std"] }
anyhow = { workspace = true }
comfy-table = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
dirs = { workspace = true }
tempfile = { workspace = true }
blake3 = { workspace = true, optional = true }
ed25519-dalek = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
dashmap = { workspace = true }
clawft-service-whisper = { workspace = true }
clawft-service-llm = { workspace = true }
clawft-service-terminal = { workspace = true }
clawft-service-classify = { workspace = true }
# Base64 encoding for terminal RPC payloads (PTY bytes don't survive
# raw JSON; chunks ride as { data: <base64>, ... }).
base64 = "0.22"
# `.env` loader. The daemon reads OPENROUTER_API_KEY (and friends) from
# the environment; loading `.env` from cwd at startup makes the
# OpenRouter takeover work without forcing the user to export keys
# in their shell rc.
dotenvy = "0.15"
exo-resource-tree = { workspace = true, optional = true }
weftos-rvf-wire = { workspace = true, optional = true }
rvf-types = { workspace = true, optional = true }
[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", default-features = false, features = ["signal", "process"] }
