# WeftOS Admin desktop variant (ADR-016 §10). The first real
# reference panel for the M1.5 composer runtime.

[[surfaces]]
id     = "weftos-admin/desktop"
modes  = ["desktop", "ide"]
inputs = ["pointer", "hybrid"]
title  = "WeftOS Admin"

subscriptions = [
  "substrate/kernel/status",
  "substrate/kernel/processes",
  "substrate/kernel/services",
  "substrate/kernel/logs",
]

[surfaces.root]
type  = "ui://grid"
id    = "/root"
attrs = { columns = 2 }

# --- Quadrant 1: overview chips -------------------------------------
[[surfaces.root.children]]
type  = "ui://stack"
id    = "/root/overview"
attrs = { axis = "horizontal", wrap = true }

[[surfaces.root.children.children]]
type     = "ui://chip"
id       = "/root/overview/status"
bindings = { label = "$substrate/kernel/status.state", tone = "$substrate/kernel/status.state" }

[[surfaces.root.children.children]]
type     = "ui://chip"
id       = "/root/overview/services-healthy"
bindings = { label = "count($substrate/kernel/services, s -> s.status == \"healthy\")" }

# --- Quadrant 2: process table --------------------------------------
[[surfaces.root.children]]
type     = "ui://table"
id       = "/root/processes"
attrs    = { columns = ["pid", "name", "cpu"] }
bindings = { rows = "$substrate/kernel/processes" }

  [[surfaces.root.children.affordances]]
  name        = "kill"
  verb        = "rpc.kernel.kill"
  invocations = ["pointer", "voice"]
  args_schema = "ontology://kernel/kill-process"

# --- Quadrant 3: service gauges -------------------------------------
[[surfaces.root.children]]
type  = "ui://stack"
id    = "/root/services"
attrs = { axis = "vertical" }

[[surfaces.root.children.children]]
type     = "ui://gauge"
id       = "/root/services/mesh-listener"
bindings = { value = "$substrate/kernel/services/mesh-listener/cpu_percent", label = "$substrate/kernel/services/mesh-listener/status" }
attrs    = { min = 0.0, max = 100.0 }

  [[surfaces.root.children.children.affordances]]
  name        = "restart"
  verb        = "rpc.kernel.restart-service"
  invocations = ["pointer", "voice"]
  args_schema = "ontology://kernel/restart-service"

# --- Quadrant 4: log stream ------------------------------------------
[[surfaces.root.children]]
type     = "ui://stream-view"
id       = "/root/logs"
bindings = { stream = "$substrate/kernel/logs" }

# --- Confirm-restart modal (WEFT-439) ---------------------------------
# A wired ui://modal with an affordance, exercising the modal path
# in the composer outside the demo lab. Renders inline today (always-
# visible) — the open/dismiss handshake ships with M5 surface state.
[[surfaces.root.children]]
type  = "ui://modal"
id    = "/root/restart-modal"
attrs = { title = "Confirm restart" }

  [[surfaces.root.children.children]]
  type  = "ui://chip"
  id    = "/root/restart-modal/prompt"
  attrs = { label = "Restart kernel? In-flight RPCs may drop." }

  [[surfaces.root.children.affordances]]
  name        = "confirm-restart"
  verb        = "rpc.kernel.restart"
  invocations = ["pointer", "voice"]
  args_schema = "ontology://kernel/restart"

# ── D-EM01 state surfaces (DESIGN.md §5) ─────────────────────────────
# Mandatory on every app-window archetype. These bind to the most
# recently appended `[[surfaces]]` entry (the desktop variant above) —
# the surface composer renders them in place of `root` when the bound
# subscriptions resolve to nothing / are loading / the daemon is
# offline. Mirrored in `crates/clawft-app/fixtures/weftos-admin.toml`
# so the manifest and the surface description stay in lockstep.

[surfaces.empty_state]
type  = "ui://stack"
id    = "/empty"
attrs = { axis = "vertical" }

[surfaces.loading_state]
type  = "ui://stack"
id    = "/loading"
attrs = { axis = "vertical" }

[surfaces.offline_state]
type     = "ui://chip"
id       = "/offline"
bindings = { tone = '"crit"', label = '"◉ Demo mode — kernel daemon offline"' }
