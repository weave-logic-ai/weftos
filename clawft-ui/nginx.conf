# nginx config for the clawft-ui Docker image (WEFT-317).
#
# Three responsibilities:
#   1. Serve the Vite SPA with a fallback to /index.html so deep links
#      (e.g. /agents/foo) hit the React router instead of a 404.
#   2. Set the correct MIME type and caching for .wasm assets so the
#      browser-only mode loads correctly under both COEP and Cloudflare.
#   3. Long-cache hashed assets under /assets/ for the SPA to remain
#      fast on subsequent loads.

# Add the WASM mime type before any server block; the default
# /etc/nginx/mime.types in alpine does not include it.
types {
  application/wasm wasm;
}

server {
  listen       80 default_server;
  listen       [::]:80 default_server;
  server_name  _;

  root  /usr/share/nginx/html;
  index index.html;

  # Vite emits hashed filenames under /assets/. Long-cache them; the SPA
  # entry HTML still revalidates so a redeploy is picked up immediately.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # WASM assets ship under public/ and end up at the document root after
  # `vite build`. They must keep the application/wasm content type so
  # WebAssembly.instantiateStreaming() works without a fetch fallback.
  location ~* \.wasm$ {
    default_type application/wasm;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  # SPA fallback: anything not matched above falls through to index.html
  # so the React router can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hide nginx version + disable the server_tokens leak.
  server_tokens off;

  # Reasonable defaults for a static SPA. Keep buffer sizes small so the
  # container survives slow-loris attacks even at the edge.
  client_max_body_size 1m;
  sendfile on;
  tcp_nopush on;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
  gzip_min_length 1024;
}
