name: Publish Crates

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/bin/
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Install cargo-workspaces
        run: |
          if ! command -v cargo-workspaces &> /dev/null; then
            cargo install cargo-workspaces
          fi

      - name: Verify tag matches workspace version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v${TAG} does not match workspace version ${VERSION}"
            exit 1
          fi
          echo "Publishing version ${VERSION}"

      - name: Publish crates (cargo-workspaces)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail

          # cargo-workspaces handles:
          # - Dependency-topological ordering
          # - Skipping publish=false crates
          # - Skipping already-published versions
          # - Retrying on transient failures
          # - Index propagation waits
          #
          # Single command replaces the entire tiered publish pipeline.

          # --no-git-commit is mutually exclusive with --no-git-push /
          # --no-git-tag in cargo-workspaces 0.3+; the single flag already
          # suppresses commit, tag, and push (it's an all-or-nothing gate).
          cargo workspaces publish \
            --from-git \
            --allow-dirty \
            --no-git-commit \
            --yes \
            --token "$CARGO_REGISTRY_TOKEN" \
            skip
