name: Release (Docker)

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # Gate: only proceed if the Release workflow succeeded
  gate:
    name: Verify release succeeded
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Extract version from tag
        id: version
        env:
          # workflow_run gives us the head_branch (the tag name)
          # workflow_dispatch falls back to GITHUB_REF_NAME
          TAG: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version from tag '${TAG}'"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building Docker image for v${VERSION}"

  # -------------------------------------------------------------------
  # Multi-arch Docker build using pre-built musl binaries from release
  # -------------------------------------------------------------------
  docker:
    name: Build & push multi-arch Docker image
    runs-on: ubuntu-latest
    needs: [gate]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.gate.outputs.version }}"

      - name: Set version
        id: version
        run: echo "VERSION=${{ needs.gate.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 layer)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          echo "## Release Image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ steps.version.outputs.VERSION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platforms | linux/amd64, linux/arm64 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Base | Alpine 3.21 (musl, ~15MB) |" >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------
  # Integration smoke test on the published image
  # -------------------------------------------------------------------
  smoke-test:
    name: Post-publish smoke test
    runs-on: ubuntu-latest
    needs: [gate, docker]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and test image (WEFT-550 health probe)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.gate.outputs.version }}"
          docker pull "$IMAGE"

          # Start container
          docker run -d \
            --name weft-release-smoke \
            -p 8080:8080 \
            "$IMAGE" gateway

          cleanup() {
            docker stop weft-release-smoke 2>/dev/null || true
            docker rm   weft-release-smoke 2>/dev/null || true
          }
          trap cleanup EXIT

          # Fail fast if the container crashes during the first 3 seconds.
          sleep 3
          if ! docker ps --filter "name=weft-release-smoke" --format "{{.Names}}" \
                 | grep -q weft-release-smoke; then
            echo "::error::Released image exited within 3 seconds."
            docker logs weft-release-smoke || true
            exit 1
          fi

          # Bounded /api/health probe (30s budget).
          deadline=$(( $(date +%s) + 30 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            code=$(curl -s -o /tmp/health.body -w '%{http_code}' \
                       --max-time 3 http://127.0.0.1:8080/api/health || echo "000")
            if [ "$code" = "200" ]; then
              echo "Released image /api/health returned 200."
              cat /tmp/health.body; echo
              exit 0
            fi
            echo "  /api/health returned ${code}, retrying..."
            sleep 2
          done
          echo "::error::Released image /api/health never returned 200 within 30s."
          docker logs weft-release-smoke || true
          exit 1
